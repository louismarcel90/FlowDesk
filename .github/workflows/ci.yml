name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flowdesk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d flowdesk_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      # OPA: on le lance en container "normal" (pas en service) pour éviter le bug "run:latest"
      - name: Start OPA
        run: |
          docker pull openpolicyagent/opa:latest
          docker run -d --name opa -p 8181:8181 openpolicyagent/opa:latest run --server --addr=0.0.0.0:8181
          docker ps --filter "name=opa"

      # Utils pour attendre postgres/redis proprement
      - name: Install DB/Redis clients
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client redis-tools

      - name: Wait for Postgres
        env:
          PGPASSWORD: postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres -d flowdesk_test && exit 0
            sleep 1
          done
          echo "Postgres not ready"
          exit 1

      - name: Wait for Redis
        run: |
          for i in {1..30}; do
            redis-cli -h localhost -p 6379 ping | grep -q PONG && exit 0
            sleep 1
          done
          echo "Redis not ready"
          exit 1

      - name: Wait for OPA
        run: |
          for i in {1..30}; do
            curl -fsS http://localhost:8181/health?plugins=true && exit 0
            sleep 1
          done
          echo "OPA not ready"
          docker logs opa || true
          exit 1

      - name: Test
        run: pnpm run test
        env:
          TURBO_ENV_MODE: loose
          NODE_ENV: test
          JWT_ACCESS_SECRET: test_access_secret_32_chars_min
          JWT_REFRESH_SECRET: test_refresh_secret_32_chars_min
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flowdesk_test
          REDIS_URL: redis://localhost:6379
          OPA_URL: http://localhost:8181

      - name: Build
        run: pnpm run build
